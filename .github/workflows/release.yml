name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        env:
          # Build unsigned: users will need to bypass Gatekeeper manually
          # (right-click → Open, or `xattr -d com.apple.quarantine /Applications/Audex.app`).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist -- --mac

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
