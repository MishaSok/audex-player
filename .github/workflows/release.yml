name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled Chromium
        run: |
          if [ ! -d chromium-bundle/chrome ]; then
            echo "::error::chromium-bundle/chrome missing — puppeteer postinstall must have failed"
            exit 1
          fi
          ls chromium-bundle/chrome

      - name: Build macOS artifacts
        env:
          # Build unsigned: users will need to bypass Gatekeeper manually
          # (right-click → Open, or `xattr -d com.apple.quarantine /Applications/Audex.app`).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # --publish never: electron-builder otherwise auto-publishes when a git tag
        # is present and demands GH_TOKEN. We attach artifacts in the next step.
        run: npm run dist -- --mac --publish never

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled Chromium
        shell: bash
        run: |
          if [ ! -d chromium-bundle/chrome ]; then
            echo "::error::chromium-bundle/chrome missing — puppeteer postinstall must have failed"
            exit 1
          fi
          ls chromium-bundle/chrome

      - name: Build Windows artifacts
        # Build unsigned: SmartScreen will warn on first launch until the binary
        # gains reputation. Add a code-signing cert later via CSC_LINK/CSC_KEY_PASSWORD.
        run: npm run dist -- --win --publish never

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
